services:
  postgres:
    image: postgres:18.0-alpine
    container_name: botcv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - botcv-network

  redis:
    image: redis:7.4
    container_name: botcv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a tusenayeudomixi --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --requirepass tusenayeudomixi
    networks:
      - botcv-network

networks:
  botcv-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: