  postgres:
    image: postgres:18.0-alpine
    container_name: jrp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: niggamove
      POSTGRES_DB: jrp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jrp-network

  redis:
    image: redis:7.4
    container_name: jrp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    command: [ "redis-server", "--appendonly", "yes" ] # bật persistence AOF
    networks:
      - jrp-network

networks:
  jrp-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:


