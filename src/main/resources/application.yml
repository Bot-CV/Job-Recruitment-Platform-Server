spring:
  application:
    name: JobRecruitmentPlatform-Server
  flyway:
    enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jrp?stringtype=unspecified}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:niggamove}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: BotCV
          secret-key: ${JWT_SECRET:7d38bb48b74cc00cfe9b83171c52042abc4a4eec296217f154ae2d810d070879}
          access-token:
            expiration: 604800000 #60000
          refresh-token:
            expiration: 604800000
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    time-zone: Asia/Ho_Chi_Minh
#  profiles:
#    default: dev

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  nlp-service-url: ${NPL_SERVICE_URL:http://localhost:8000}
  default-avatar-public-id: ${DEFAULT_AVT_PUBLIC_ID:bot-cv/avatar/299c1e01-6d3c-462d-a49b-993f51b06cef}
