name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.0-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: botcv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Enable PostgreSQL ltree extension
        run: PGPASSWORD=ci_password psql -h localhost -U ci_user -d botcv_test -c "CREATE EXTENSION IF NOT EXISTS ltree;"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw -B verify
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: botcv_test
          POSTGRES_USERNAME: ci_user
          POSTGRES_PASSWORD: ci_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          REDIS_USERNAME: ""
          JWT_ISSUER_URI: https://ci.example.com
          JWT_SECRET: ci-secret-key-that-is-at-least-32-characters-long
          ACCESS_TOKEN_EXPIRATION: 3600
          REFRESH_TOKEN_EXPIRATION: 86400
          CLIENT_ID: fake-client-id
          CLIENT_SECRET: fake-client-secret
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: ci@test.com
          MAIL_PASSWORD: ci-password
          CLOUDINARY_NAME: fake
          CLOUDINARY_API_KEY: fake
          CLOUDINARY_API_SECRET: fake
          CLOUDINARY_BASE_URL: https://res.cloudinary.com/fake
          FRONTEND_URL: http://localhost:3000
          NER_SERVICE_URL: http://localhost:8001
          SEARCH_SERVICE_URL: http://localhost:8002
          RECOMMENDATION_SERVICE_URL: http://localhost:8003
          DEFAULT_AVT_PUBLIC_ID: default-avatar
